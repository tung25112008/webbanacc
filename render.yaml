# Render Deployment Configuration
services:
  - type: web
    name: tft-acc-shop
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
    disk:
      name: tft-data
      mountPath: /data
      sizeGB: 1
