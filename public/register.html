<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Ký | TFT ACC SHOP</title>
  <link rel="stylesheet" href="style.css">
  <script src="api.js" defer></script>
  <script src="app.js" defer></script>
  <script src="auth-pages.js" defer></script>
</head>

<body>
  <!-- Background Animation -->
  <div class="bg-particles"></div>

  <main class="auth-page">
    <div class="auth-card">
      <a href="/" style="display: flex; justify-content: center; margin-bottom: 24px; font-size: 2rem;">
        🐧
      </a>
      <h1 class="auth-title">Tạo Tài Khoản</h1>
      <p class="auth-subtitle">Đăng ký để mua acc với nhiều ưu đãi</p>

      <form id="register-form" class="auth-form">
        <div class="form-group">
          <label for="reg-username">Tên đăng nhập</label>
          <input type="text" id="reg-username" name="username" class="form-input" required minlength="3"
            placeholder="Ít nhất 3 ký tự">
        </div>

        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" name="email" class="form-input" required placeholder="Email của bạn">
        </div>

        <div class="form-group">
          <label for="reg-password">Mật khẩu</label>
          <input type="password" id="reg-password" name="password" class="form-input" required minlength="6"
            placeholder="Ít nhất 6 ký tự">
        </div>

        <div class="form-group">
          <label for="reg-confirm">Xác nhận mật khẩu</label>
          <input type="password" id="reg-confirm" name="confirmPassword" class="form-input" required
            placeholder="Nhập lại mật khẩu">
        </div>

        <div id="register-error" class="form-error" style="margin-bottom: 16px; text-align: center;"></div>

        <button type="submit" class="btn btn-primary">Đăng Ký</button>
      </form>

      <div class="auth-footer">
        Đã có tài khoản? <a href="login.html">Đăng nhập</a>
      </div>
    </div>
  </main>
</body>

</html>
