<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng Nhập | TFT ACC SHOP</title>
  <link rel="stylesheet" href="style.css">
  <script src="api.js" defer></script>
  <script src="app.js" defer></script>
  <script src="auth-pages.js" defer></script>
</head>

<body>
  <!-- Background Animation -->
  <div class="bg-particles"></div>

  <main class="auth-page">
    <div class="auth-card">
      <a href="/" style="display: flex; justify-content: center; margin-bottom: 24px; font-size: 2rem;">
        🐧
      </a>
      <h1 class="auth-title">Đăng Nhập</h1>
      <p class="auth-subtitle">Chào mừng bạn quay lại TFT Shop</p>

      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label for="username">Tên đăng nhập</label>
          <input type="text" id="username" name="username" class="form-input" required placeholder="Nhập username...">
        </div>

        <div class="form-group">
          <label for="password">Mật khẩu</label>
          <input type="password" id="password" name="password" class="form-input" required
            placeholder="Nhập mật khẩu...">
        </div>

        <div id="login-error" class="form-error" style="margin-bottom: 16px; text-align: center;"></div>

        <button type="submit" class="btn btn-primary">Đăng Nhập</button>
      </form>

      <div class="auth-footer">
        Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
      </div>
    </div>
  </main>
</body>

</html>
